services:
  # Django Web Service (Gunicorn)
  - type: web
    name: morefish-api
    runtime: python
    region: oregon
    repo: https://github.com/xjackhammered/MoreFish
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn morefish_pppl.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: morefish-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Asia/Dhaka
      - key: USE_TZ
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: EMAIL_HOST_USER
        value: ""
      - key: EMAIL_HOST_PASSWORD
        value: ""
      # Note: GOOGLE_APPLICATION_CREDENTIALS will need to be set manually via secret files

  # Celery Worker
  - type: worker
    name: morefish-celery
    runtime: python
    region: oregon
    repo: https://github.com/xjackhammered/MoreFish
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: celery -A morefish_pppl worker -l info
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: morefish-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Asia/Dhaka
      - key: USE_TZ
        value: "False"

  # Celery Beat
  - type: worker
    name: morefish-beat
    runtime: python
    region: oregon
    repo: https://github.com/xjackhammered/MoreFish
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: celery -A morefish_pppl beat -l info
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: morefish-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Asia/Dhaka
      - key: USE_TZ
        value: "False"

  # Fish Farm MQTT Listener
  - type: worker
    name: morefish-mqtt-fish
    runtime: python
    region: oregon
    repo: https://github.com/xjackhammered/MoreFish
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python raw_data_insertion.py
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: morefish-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Asia/Dhaka
      - key: USE_TZ
        value: "False"

  # Poultry MQTT Listener
  - type: worker
    name: morefish-mqtt-poultry
    runtime: python
    region: oregon
    repo: https://github.com/xjackhammered/MoreFish
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python poultry_mqtt.py
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: morefish-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: morefish-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Asia/Dhaka
      - key: USE_TZ
        value: "False"

databases:
  - name: morefish-db
    databaseName: morefish
    plan: free
    region: oregon

  - name: morefish-redis
    plan: free
    region: oregon