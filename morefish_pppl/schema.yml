components:
  schemas:
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    Login:
      type: object
      properties:
        usr_email:
          type: string
          maxLength: 255
        password:
          type: string
          writeOnly: true
          maxLength: 128
      required:
      - password
      - usr_email
    PatchedChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
    Register:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
          maxLength: 128
        usr_email:
          type: string
          format: email
          nullable: true
          title: Email address
          maxLength: 254
        company:
          type: integer
          nullable: true
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          minimum: -2147483648
          maximum: 2147483647
      required:
      - password
    UserTypeEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      type: integer
      description: |-
        * `0` - SUPER_USER
        * `1` - ORGANIZATION_USER
        * `2` - ZONAL_ADMIN
        * `3` - CONSUMER
        * `4` - OPERATOR
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "['token', 'bearer']"
